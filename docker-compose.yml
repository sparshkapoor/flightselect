version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flightselect_postgres
    environment:
      POSTGRES_USER: flightselect
      POSTGRES_PASSWORD: flightselect_password
      POSTGRES_DB: flightselect_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flightselect']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flightselect_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: flightselect_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flightselect.dev
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
